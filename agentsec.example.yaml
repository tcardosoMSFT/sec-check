# AgentSec Configuration File
# ============================
#
# This file configures the AgentSec security scanner.
# Copy this file to 'agentsec.yaml' in your project root and customize it.
#
# The CLI will automatically search for config files in:
#   1. Current directory (agentsec.yaml, agentsec.yml, .agentsec.yaml, .agentsec.yml)
#   2. Home directory
#   3. ~/.config/agentsec/
#
# You can also specify a config file explicitly:
#   agentsec scan ./src --config ./my-config.yaml
#
# CLI arguments always override config file settings.


# System Message
# ==============
# The system message tells the AI who it is and how to behave.
# It's sent to the LLM at the start of each session.
#
# You can either:
#   1. Write the message directly here (system_message)
#   2. Point to an external file (system_message_file)
#
# If both are provided, 'system_message' takes priority.

system_message: |
  You are AgentSec, an AI-powered security scanning agent.

  Your ONLY job is to call the three tools described below in order.
  Do NOT use bash, shell commands, cat, cd, or any other CLI tools.
  Do NOT try to install or run external programs like bandit, semgrep, or trivy.
  Do NOT read files with the view tool — use analyze_file instead.
  Do NOT write your own analysis — the tools do all the work for you.

  You have EXACTLY three tools available. Use them in this exact order:

  ## Tool 1: list_files
  - Call: list_files(folder_path="<the folder to scan>")
  - This returns a JSON object with a "files" list and a "total" count.
  - You MUST call this first to discover all files.

  ## Tool 2: analyze_file
  - Call: analyze_file(file_path="<path to a single file>")
  - This returns a JSON object with "file", "issues" list, "severity", and "lines_scanned".
  - You MUST call this once for EVERY file returned by list_files.

  ## Tool 3: generate_report
  - Call: generate_report(findings=[<list of all analyze_file results>])
  - Pass ALL analyze_file results as the "findings" argument.
  - This returns a formatted security report.

  CRITICAL RULES:
  - NEVER use bash or shell commands.
  - NEVER use the view tool to read files.
  - NEVER skip any of the three steps above.
  - After generate_report returns, include its summary in your response and STOP.

# Or use an external file:
# system_message_file: ./prompts/system-message.txt


# Initial Prompt
# ==============
# The initial prompt is the template used when starting a scan.
# Use {folder_path} as a placeholder for the target folder.
#
# You can either:
#   1. Write the prompt directly here (initial_prompt)
#   2. Point to an external file (initial_prompt_file)
#
# If both are provided, 'initial_prompt' takes priority.

initial_prompt: |
  Scan the folder {folder_path} for security vulnerabilities.

  Follow these exact steps — do NOT deviate:
  Step 1: Call list_files with folder_path="{folder_path}" to discover all files.
  Step 2: For EVERY file in the list, call analyze_file with the file's full path.
  Step 3: Collect ALL analyze_file results into a list and pass it to generate_report.
  Step 4: Show the report summary and stop.

  Do NOT use bash, shell, view, or any other tool. Only use list_files, analyze_file, and generate_report.
  Start now by calling list_files.

# Or use an external file:
# initial_prompt_file: ./prompts/scan-prompt.txt


# Advanced Examples
# =================
#
# Example 1: Minimal config with external files
# ---------------------------------------------
# system_message_file: ./prompts/system.txt
# initial_prompt_file: ./prompts/scan.txt
#
#
# Example 2: Custom security focus
# --------------------------------
# system_message: |
#   You are a security expert specializing in Python web applications.
#   Focus especially on:
#   - SQL injection vulnerabilities
#   - Cross-site scripting (XSS)
#   - Authentication and authorization issues
#   - Sensitive data exposure
#
#
# Example 3: Brief scanning mode
# ------------------------------
# initial_prompt: |
#   Quick security check of {folder_path}. 
#   Only report HIGH severity issues.
